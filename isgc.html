<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İSG Kayıt Paneli - Basitleştirilmiş</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #6366f1; --text: #f8fafc; --danger: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .hidden { display: none !important; }
        
        /* Auth Screen */
        #auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }

        /* Main Layout */
        #main-app { display: flex; width: 100%; }
        .sidebar { width: 260px; background: var(--panel); padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .nav-btn { background: transparent; border: none; color: #94a3b8; padding: 12px 15px; text-align: left; cursor: pointer; border-radius: 8px; margin-bottom: 8px; }
        .nav-btn.active { background: var(--accent); color: white; }
        .content-area { flex-grow: 1; padding: 40px; overflow-y: auto; }

        /* Inputs */
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button.primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #94a3b8; }
        .logout-btn { margin-top: auto; color: var(--danger); border: 1px solid var(--danger); background: transparent; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">Yükleniyor...</div>

    <section id="auth-screen" class="hidden">
        <div class="auth-card">
            <h2>İSG Panel Giriş</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="E-posta Adresiniz">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifreniz">
            </div>
            <button class="primary" onclick="handleAuth('LOGIN')">Giriş Yap / Kayıt Ol</button>
        </div>
    </section>

    <main id="main-app" class="hidden">
        <nav class="sidebar">
            <h3 style="color: var(--accent)">ISG-PRO</h3>
            <button class="nav-btn active" id="btn-input" onclick="showView('input')">📝 Yeni Kayıt</button>
            <button class="nav-btn" id="btn-list" onclick="showView('list')">📊 Liste & Grafikler</button>
            <button class="logout-btn" onclick="handleAuth('LOGOUT')">Çıkış Yap</button>
        </nav>

        <section class="content-area">
            <div id="view-input" class="view">
                <h3>Veri Girişi</h3>
                <div style="max-width: 400px; background: var(--panel); padding: 25px; border-radius: 12px;">
                    <div class="input-group">
                        <input type="text" id="data-title" placeholder="Kayıt Başlığı (Örn: Ortam Sıcaklığı)">
                    </div>
                    <div class="input-group">
                        <input type="text" id="data-desc" placeholder="Açıklama (Örn: A Blok 2. Kat)">
                    </div>
                    <div class="input-group">
                        <input type="number" id="data-value" placeholder="Ölçülen Değer">
                    </div>
                    <button class="primary" id="save-btn" onclick="saveData()">Veriyi Kaydet</button>
                </div>
            </div>

            <div id="view-list" class="view hidden">
                <h3>Kayıt Geçmişi</h3>
                <div style="background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 30px; height: 300px;">
                    <canvas id="mainChart"></canvas>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Başlık</th>
                            <th>Açıklama</th>
                            <th>Değer</th>
                            <th>Tarih</th>
                        </tr>
                    </thead>
                    <tbody id="data-tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKMNWTvGumzxIdC7esWtzJ7dtW4B9fwqg",
            authDomain: "isgproje-eb513.firebaseapp.com",
            projectId: "isgproje-eb513",
            storageBucket: "isgproje-eb513.firebasestorage.app",
            messagingSenderId: "337017008953",
            appId: "1:337017008953:web:4a5d057383b3d28ed2aee8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let chartInstance = null;

        // --- AUTH İŞLEMLERİ ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            if (type === 'LOGOUT') { await signOut(auth); return; }
            if (!email || !pass) return alert("Lütfen alanları doldurun.");

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found') {
                    try { await createUserWithEmailAndPassword(auth, email, pass); } 
                    catch (e) { alert("Hata: " + e.message); }
                } else { alert("Giriş Hatası: " + err.message); }
            }
        };

        onAuthStateChanged(auth, user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // --- NAVİGASYON ---
        window.showView = (v) => {
            document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            document.getElementById(`btn-${v}`).classList.add('active');
        };

        // --- VERİ KAYDETME ---
        window.saveData = async () => {
            const title = document.getElementById('data-title').value;
            const desc = document.getElementById('data-desc').value;
            const val = document.getElementById('data-value').value;
            const btn = document.getElementById('save-btn');

            if (!title || !val) return alert("Başlık ve Değer zorunludur!");

            btn.disabled = true;
            btn.innerText = "Kaydediliyor...";

            try {
                await addDoc(collection(db, "records"), {
                    title: title,
                    desc: desc,
                    value: Number(val),
                    userId: auth.currentUser.uid,
                    createdAt: Date.now()
                });
                document.getElementById('data-title').value = "";
                document.getElementById('data-desc').value = "";
                document.getElementById('data-value').value = "";
                alert("Başarıyla kaydedildi!");
            } catch (e) {
                alert("Kaydetme hatası: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Veriyi Kaydet";
            }
        };

        // --- VERİLERİ YÜKLE VE LİSTELE ---
        function loadData() {
            const q = query(collection(db, "records"), orderBy("createdAt", "desc"));
            onSnapshot(q, snapshot => {
                const items = [];
                snapshot.forEach(doc => items.push(doc.data()));
                updateUI(items);
            });
        }

        function updateUI(data) {
            // Tabloyu Güncelle
            const tbody = document.getElementById('data-tbody');
            tbody.innerHTML = "";
            data.forEach(item => {
                const tr = `<tr>
                    <td>${item.title}</td>
                    <td>${item.desc}</td>
                    <td><b>${item.value}</b></td>
                    <td>${new Date(item.createdAt).toLocaleDateString()}</td>
                </tr>`;
                tbody.innerHTML += tr;
            });

            // Grafiği Güncelle
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            const chartData = [...data].reverse();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(d => d.title),
                    datasets: [{
                        label: 'Ölçüm Değerleri',
                        data: chartData.map(d => d.value),
                        borderColor: '#6366f1',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.2)'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } }
                }
            });
        }
    </script>
</body>
</html>
