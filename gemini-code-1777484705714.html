<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Veri Yönetimi Pro v1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }

        .hidden { display: none !important; }

        #auth-screen {
            width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--panel); padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }

        #main-app { display: flex; width: 100%; }
        
        .sidebar {
            width: 260px; background: var(--panel); padding: 25px;
            display: flex; flex-direction: column; border-right: 1px solid #334155;
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 40px; }

        .nav-btn {
            background: transparent; border: none; color: #94a3b8;
            padding: 12px 15px; text-align: left; cursor: pointer;
            border-radius: 8px; margin-bottom: 8px; font-weight: 500;
        }
        .nav-btn:hover { background: #334155; color: white; }
        .nav-btn.active { background: var(--accent); color: white; }

        .content-area { flex-grow: 1; padding: 40px; overflow-y: auto; }

        .input-group { margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; margin-top: 5px;
        }
        button.primary {
            background: var(--accent); color: white; border: none;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .stat-card h4 { margin: 0; color: #94a3b8; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #94a3b8; font-size: 13px; }
        .table-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }
        
        .inline-edit { background: #0f172a; border: 1px solid var(--accent); width: 100%; padding: 5px; color: white; }
        .logout-btn { margin-top: auto; color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

    <div id="loader">Yükleniyor...</div>

    <section id="auth-screen" class="hidden">
        <div class="auth-card">
            <h2>Giriş Yap</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="E-posta">
                <input type="password" id="password" placeholder="Şifre">
            </div>
            <button class="primary" onclick="handleAuth('LOGIN')">Giriş Yap</button>
            <p style="text-align: center; font-size: 12px; color: #94a3b8; margin-top: 15px;">
                Kaydınız yoksa otomatik olarak yeni hesap oluşturulur.
            </p>
        </div>
    </section>

    <main id="main-app" class="hidden">
        <nav class="sidebar">
            <div class="logo">ISG-PROJE</div>
            <button class="nav-btn active" id="btn-input" onclick="showView('input')">📤 Veri Kaydı</button>
            <button class="nav-btn" id="btn-dash" onclick="showView('dash')">📊 İstatistikler</button>
            <button class="nav-btn" id="btn-list" onclick="showView('list')">📝 Liste & Düzenle</button>
            <button class="nav-btn logout-btn" onclick="handleAuth('LOGOUT')">🚪 Çıkış</button>
        </nav>

        <section class="content-area">
            <div id="view-input" class="view">
                <h3>Yeni Veri Ekle</h3>
                <div style="max-width: 500px; background: var(--panel); padding: 30px; border-radius: 12px;">
                    <div class="input-group">
                        <label>Görsel Seç</label>
                        <input type="file" id="data-img" accept="image/*">
                    </div>
                    <div class="input-group">
                        <input type="text" id="data-title" placeholder="Kayıt Başlığı">
                    </div>
                    <div class="input-group">
                        <input type="text" id="data-desc" placeholder="Açıklama">
                    </div>
                    <div class="input-group">
                        <input type="number" id="data-value" placeholder="Sayısal Değer">
                    </div>
                    <button class="primary" id="save-btn" onclick="saveData()">Kaydet</button>
                </div>
            </div>

            <div id="view-dash" class="view hidden">
                <h3>Genel Durum</h3>
                <div class="stats-grid">
                    <div class="stat-card"><h4>Toplam Kayıt</h4><p id="stat-total">0</p></div>
                    <div class="stat-card"><h4>Ortalama Değer</h4><p id="stat-avg">0</p></div>
                </div>
                <div style="background: var(--panel); padding: 20px; border-radius: 12px; height: 400px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div id="view-list" class="view hidden">
                <h3>Veri Listesi</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Görsel</th>
                            <th>Başlık (Düzenle)</th>
                            <th>Açıklama</th>
                            <th>Değer</th>
                            <th>Tarih</th>
                        </tr>
                    </thead>
                    <tbody id="data-tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        // Firebase Modülleri
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKMNWTvGumzxIdC7esWtzJ7dtW4B9fwqg",
            authDomain: "isgproje-eb513.firebaseapp.com",
            projectId: "isgproje-eb513",
            storageBucket: "isgproje-eb513.firebasestorage.app",
            messagingSenderId: "337017008953",
            appId: "1:337017008953:web:4a5d057383b3d28ed2aee8",
            measurementId: "G-P9X961LK29"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentChart = null;

        // --- AUTH ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (type === 'LOGOUT') {
                await signOut(auth);
                return;
            }

            if(!email || !pass) return alert("Bilgileri girin");

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                    } catch (e) { alert("Hata: " + e.message); }
                } else {
                    alert("Hata: " + error.message);
                }
            }
        };

        onAuthStateChanged(auth, user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                initDataListener();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // --- NAVIGATION ---
        window.showView = (viewName) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.getElementById(`btn-${viewName}`).classList.add('active');
        };

        // --- SAVE ---
        window.saveData = async () => {
            const file = document.getElementById('data-img').files[0];
            const title = document.getElementById('data-title').value;
            const desc = document.getElementById('data-desc').value;
            const val = document.getElementById('data-value').value;
            const btn = document.getElementById('save-btn');

            if(!file || !title || !val) return alert("Eksik alan!");

            btn.disabled = true;
            btn.innerText = "Yükleniyor...";

            try {
                const imgRef = ref(storage, `images/${Date.now()}_${file.name}`);
                await uploadBytes(imgRef, file);
                const url = await getDownloadURL(imgRef);

                await addDoc(collection(db, "records"), {
                    title: title,
                    desc: desc,
                    value: Number(val),
                    img: url,
                    userId: auth.currentUser.uid,
                    createdAt: Date.now()
                });

                alert("Kaydedildi!");
                document.getElementById('data-img').value = "";
                document.getElementById('data-title').value = "";
                document.getElementById('data-desc').value = "";
                document.getElementById('data-value').value = "";
            } catch (e) {
                alert("Hata: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Kaydet";
            }
        };

        // --- LISTENER ---
        function initDataListener() {
            const q = query(collection(db, "records"), orderBy("createdAt", "desc"));
            onSnapshot(q, snapshot => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                renderTable(data);
                renderChart(data);
                updateStats(data);
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('data-tbody');
            tbody.innerHTML = "";
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${item.img}" class="table-img"></td>
                    <td><input type="text" class="inline-edit" value="${item.title}" onchange="updateRecord('${item.id}', this.value)"></td>
                    <td>${item.desc}</td>
                    <td>${item.value}</td>
                    <td>${new Date(item.createdAt).toLocaleDateString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.updateRecord = async (docId, newTitle) => {
            try {
                await updateDoc(doc(db, "records", docId), { title: newTitle });
            } catch (e) { alert("Güncelleme hatası"); }
        };

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            const avg = data.length > 0 ? (data.reduce((acc, curr) => acc + curr.value, 0) / data.length).toFixed(1) : 0;
            document.getElementById('stat-avg').innerText = avg;
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            const chartData = [...data].reverse();
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(d => d.title),
                    datasets: [{
                        label: 'Değerler',
                        data: chartData.map(d => d.value),
                        borderColor: '#6366f1',
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.3
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
